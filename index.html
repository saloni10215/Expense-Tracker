<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expense Tracker</h1>

        <form>
            <input
                type="text"
                id="expenseName"
                placeholder="Expense Name"
            >

            <input
                type="number"
                id="amount"
                placeholder="Amount"
            >

            <input
                type="text"
                id="category"
                placeholder="Category"
            >

            <button type="button" id="addBtn">
                Add Expense
            </button>
        </form>

        <div class="summary">
            <h3>
                Total Expenses: ₹<span id="total">0</span>
            </h3>
        </div>

        <div class="expenses">
            <h2>Expenses</h2>

            <ul id="expenseList">
            </ul>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
